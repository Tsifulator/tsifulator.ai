<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tsifl Notes</title>
  <style>
    :root{--blue:#0D5EAF;--bh:#0A4896;--bl:#EBF3FB;--bg:#F8FAFC;--sf:#FFFFFF;--bd:#E2E8F0;--tx:#1E293B;--mu:#64748B;--gn:#16A34A;--rd:#DC2626;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;}
    #login{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100vh;padding:20px;gap:10px;}
    #login h1{color:var(--blue);font-size:28px;font-weight:700;}
    #login .sub{color:var(--mu);font-size:13px;margin-bottom:24px;}
    #login-form{display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px;}
    #login-form input{width:100%;background:var(--sf);color:var(--tx);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;font-size:14px;outline:none;}
    #login-form input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(13,94,175,0.1);}
    .btn-p{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;}
    .btn-p:hover{background:var(--bh);}
    .btn-s{background:transparent;color:var(--blue);border:1px solid var(--bd);border-radius:6px;padding:9px;font-size:14px;cursor:pointer;}
    #auth-error{font-size:12px;color:var(--rd);text-align:center;min-height:16px;}
    #app{display:none;height:100vh;flex-direction:row;}
    @media(max-width:640px){#app{flex-direction:column!important;}#sidebar{width:100%!important;max-height:40vh;border-right:none!important;border-bottom:1px solid var(--bd);}}
    #sidebar{width:280px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
    .sh{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
    .sh h2{color:var(--blue);font-size:16px;font-weight:700;}
    .sh .nb{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;}
    .ss{padding:8px 16px;}
    .ss input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;font-size:13px;outline:none;}
    .ss input:focus{border-color:var(--blue);}
    .sf{padding:4px 12px;display:flex;gap:4px;flex-wrap:wrap;}
    .fd{padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;color:var(--mu);background:var(--bg);border:1px solid var(--bd);}
    .fd.a{background:var(--bl);color:var(--blue);border-color:rgba(13,94,175,0.3);font-weight:600;}
    #nl{flex:1;overflow-y:auto;padding:4px 8px;}
    #nl::-webkit-scrollbar{width:4px;}
    #nl::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px;}
    .nc{padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;}
    .nc:hover{background:var(--bg);}
    .nc.a{background:var(--bl);border-color:rgba(13,94,175,0.2);}
    .nc .t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .nc .p{font-size:11px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
    .nc .d{font-size:10px;color:var(--mu);margin-top:2px;}
    .su{padding:8px 16px;border-top:1px solid var(--bd);font-size:11px;color:var(--mu);cursor:default;}
    #editor{flex:1;display:flex;flex-direction:column;background:var(--sf);}
    #empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--mu);gap:8px;}
    #empty .lg{font-size:24px;color:var(--blue);font-weight:700;}
    .et{padding:10px 20px;border-bottom:1px solid var(--bd);display:none;align-items:center;gap:8px;flex-wrap:wrap;}
    .et input{flex:1;min-width:120px;border:none;font-size:18px;font-weight:600;color:var(--tx);outline:none;background:transparent;}
    .et input::placeholder{color:var(--bd);}
    .tb{background:var(--bg);color:var(--mu);border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;white-space:nowrap;}
    .tb:hover{background:var(--bl);color:var(--blue);border-color:var(--blue);}
    .tb.dg:hover{background:#FEF2F2;color:var(--rd);border-color:var(--rd);}
    #nb{flex:1;padding:20px;font-size:14px;line-height:1.7;outline:none;overflow-y:auto;resize:none;border:none;background:var(--sf);color:var(--tx);font-family:inherit;display:none;}
    #nb::placeholder{color:#CBD5E1;}
    #ar{display:none;padding:12px 20px;background:#F0FDF4;border-top:1px solid #BBF7D0;font-size:13px;line-height:1.6;max-height:220px;overflow-y:auto;white-space:pre-wrap;}
    .ef{padding:8px 20px;border-top:1px solid var(--bd);display:none;align-items:center;gap:6px;}
    .ef input{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;font-size:13px;outline:none;}
    .ef input:focus{border-color:var(--blue);}
    .ef button{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;}
    .ef button:disabled{background:var(--bd);cursor:not-allowed;}
  </style>
</head>
<body>
  <div id="login">
    <h1>tsifl Notes</h1>
    <div class="sub">AI-powered notes for financial analysts</div>
    <div id="login-form">
      <input type="email" id="em" placeholder="Email"/>
      <input type="password" id="pw" placeholder="Password"/>
      <button class="btn-p" id="si">Sign In</button>
      <button class="btn-s" id="su">Create Account</button>
      <div id="auth-error"></div>
    </div>
  </div>
  <div id="app">
    <div id="sidebar">
      <div class="sh"><h2>Notes</h2><button class="nb" id="new-btn">+ New</button></div>
      <div class="ss"><input id="srch" placeholder="Search notes..."/></div>
      <div class="sf" id="flds"></div>
      <div id="nl"></div>
      <div class="su" id="ub"></div>
    </div>
    <div id="editor">
      <div id="empty"><div class="lg">tsifl Notes</div><div>Select a note or create a new one</div><div style="font-size:12px;">Cmd+N to create, Cmd+S to save</div></div>
      <div class="et" id="tbar">
        <input id="nt" placeholder="Note title..."/>
        <button class="tb" data-ai="summarize">Summarize</button>
        <button class="tb" data-ai="action_items">Actions</button>
        <button class="tb" data-ai="expand">Expand</button>
        <button class="tb" data-ai="rewrite">Rewrite</button>
        <button class="tb dg" id="del-btn">Delete</button>
      </div>
      <textarea id="nb" placeholder="Start writing..."></textarea>
      <div id="ar"></div>
      <div class="ef" id="ft">
        <input id="aq" placeholder="Ask AI about this note..."/>
        <button id="ab">Ask</button>
      </div>
    </div>
  </div>
<script>
const API="https://focused-solace-production-6839.up.railway.app";
const SU="https://dvynmzeyttwlmvunicqz.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2eW5temV5dHR3bG12dW5pY3F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTIwMTIsImV4cCI6MjA5MDIyODAxMn0.9j_f-2f1VswxWfqiuXy4bPnUi1qLk9nAeTDlodUBUZw";
let U=null,N=[],AI=null,AF=null,ST=null;
async function sa(ep,b){const r=await fetch(`${SU}/auth/v1/${ep}`,{method:"POST",headers:{"Content-Type":"application/json",apikey:SK},body:JSON.stringify(b)});return r.json();}
async function ss(s){if(!s?.access_token)return;try{await fetch(`${API}/auth/set-session`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({access_token:s.access_token,refresh_token:s.refresh_token,user_id:s.user?.id||"",email:s.user?.email||""})});}catch(e){}}
async function init(){
  const sv=localStorage.getItem("tsifl_ns");
  if(sv){try{const s=JSON.parse(sv),r=await sa("token?grant_type=refresh_token",{refresh_token:s.refresh_token});if(r.access_token){localStorage.setItem("tsifl_ns",JSON.stringify(r));ss(r);return show({id:r.user?.id||s.user?.id,email:r.user?.email||s.user?.email});}}catch(e){}}
  try{const r=await fetch(`${API}/auth/get-session`),d=await r.json();if(d.session?.refresh_token){const r2=await sa("token?grant_type=refresh_token",{refresh_token:d.session.refresh_token});if(r2.access_token){localStorage.setItem("tsifl_ns",JSON.stringify(r2));ss(r2);return show({id:r2.user?.id||d.session.user_id,email:r2.user?.email||d.session.email});}}}catch(e){}
}
function show(u){U=u;document.getElementById("login").style.display="none";document.getElementById("app").style.display="flex";document.getElementById("ub").textContent=u.email;ln();}
document.getElementById("si").onclick=async()=>{const e=document.getElementById("em").value.trim(),p=document.getElementById("pw").value,er=document.getElementById("auth-error");er.textContent="";er.style.color="#DC2626";if(!e||!p){er.textContent="Enter email and password.";return;}try{const r=await sa("token?grant_type=password",{email:e,password:p});if(r.error||r.error_description){er.textContent=r.error_description||r.error||"Failed";return;}localStorage.setItem("tsifl_ns",JSON.stringify(r));ss(r);show({id:r.user.id,email:r.user.email});}catch(x){er.textContent="Network error";}};
document.getElementById("su").onclick=async()=>{const e=document.getElementById("em").value.trim(),p=document.getElementById("pw").value,er=document.getElementById("auth-error");er.textContent="";if(!e||!p){er.textContent="Enter email and password.";return;}if(p.length<6){er.textContent="6+ characters.";return;}try{const r=await sa("signup",{email:e,password:p});if(r.error){er.textContent=r.error_description||"Failed";return;}er.style.color="#16A34A";er.textContent="Check email to confirm.";}catch(x){er.textContent="Network error";}};
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("si").click();});
document.getElementById("ub").addEventListener("dblclick",()=>{localStorage.removeItem("tsifl_ns");fetch(`${API}/auth/clear-session`,{method:"POST"}).catch(()=>{});U=null;document.getElementById("login").style.display="flex";document.getElementById("app").style.display="none";});

async function ln(){try{let u=`${API}/notes/?user_id=${U.id}`;if(AF)u+=`&folder=${encodeURIComponent(AF)}`;const r=await fetch(u),d=await r.json();N=d.notes||[];rl();lf();}catch(e){N=[];rl();}}
async function lf(){try{const r=await fetch(`${API}/notes/folders/list?user_id=${U.id}`),d=await r.json();rf(d.folders||["General"]);}catch(e){rf(["General"]);}}
async function cn(){try{const r=await fetch(`${API}/notes/`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:U.id,title:"Untitled Note",content:"",folder:AF||"General"})});const n=await r.json();N.unshift(n);rl();sn(n.id);}catch(e){}}
async function sv(){if(!AI)return;const t=document.getElementById("nt").value,c=document.getElementById("nb").value;try{await fetch(`${API}/notes/${AI}?user_id=${U.id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({title:t,content:c})});const n=N.find(x=>String(x.id)===String(AI));if(n){n.title=t;n.content=c;}rl();}catch(e){}}
async function dn(){if(!AI||!confirm("Delete this note?"))return;try{await fetch(`${API}/notes/${AI}?user_id=${U.id}`,{method:"DELETE"});N=N.filter(x=>String(x.id)!==String(AI));AI=null;rl();se();}catch(e){}}
function sn(id){AI=String(id);const n=N.find(x=>String(x.id)===String(id));if(!n)return;document.getElementById("empty").style.display="none";document.getElementById("tbar").style.display="flex";document.getElementById("nb").style.display="block";document.getElementById("ft").style.display="flex";document.getElementById("ar").style.display="none";document.getElementById("nt").value=n.title||"";document.getElementById("nb").value=n.content||"";rl();}
function se(){document.getElementById("empty").style.display="flex";document.getElementById("tbar").style.display="none";document.getElementById("nb").style.display="none";document.getElementById("ft").style.display="none";document.getElementById("ar").style.display="none";}
function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML;}
function rl(){const l=document.getElementById("nl"),q=document.getElementById("srch").value.toLowerCase();let f=N;if(q)f=N.filter(n=>(n.title+" "+n.content).toLowerCase().includes(q));l.innerHTML=f.map(n=>{const pv=(n.content||"").replace(/\n/g," ").slice(0,60),dt=n.updated_at?new Date(n.updated_at).toLocaleDateString():"",ac=String(n.id)===String(AI)?" a":"";return`<div class="nc${ac}" data-id="${n.id}"><div class="t">${esc(n.title||"Untitled")}</div><div class="p">${esc(pv)}</div><div class="d">${dt}</div></div>`;}).join("");l.querySelectorAll(".nc").forEach(el=>el.onclick=()=>sn(el.dataset.id));}
function rf(folders){const el=document.getElementById("flds");el.innerHTML=`<div class="fd${!AF?" a":""}" data-f="">All</div>`+folders.map(f=>`<div class="fd${AF===f?" a":""}" data-f="${esc(f)}">${esc(f)}</div>`).join("");el.querySelectorAll(".fd").forEach(i=>i.onclick=()=>{AF=i.dataset.f||null;ln();});}
async function aa(action,question){if(!AI)return;const ar=document.getElementById("ar");ar.style.display="block";ar.textContent="Thinking...";document.getElementById("ab").disabled=true;try{const r=await fetch(`${API}/notes/${AI}/ai`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:U.id,action,question:question||""})});const d=await r.json();ar.textContent=d.result||d.detail||"No response";}catch(e){ar.textContent="Error: "+e.message;}document.getElementById("ab").disabled=false;}
document.getElementById("new-btn").onclick=cn;
document.getElementById("del-btn").onclick=dn;
document.querySelectorAll("[data-ai]").forEach(b=>b.onclick=()=>aa(b.dataset.ai));
document.getElementById("ab").onclick=()=>{const q=document.getElementById("aq").value.trim();if(q){document.getElementById("aq").value="";aa("ask",q);}};
document.getElementById("aq").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();document.getElementById("ab").click();}});
document.getElementById("nb").addEventListener("input",()=>{clearTimeout(ST);ST=setTimeout(sv,1000);});
document.getElementById("nt").addEventListener("input",()=>{clearTimeout(ST);ST=setTimeout(sv,1000);});
document.getElementById("srch").addEventListener("input",rl);
document.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key==="n"&&U){e.preventDefault();cn();}if((e.metaKey||e.ctrlKey)&&e.key==="s"&&AI){e.preventDefault();sv();}if(e.key==="Escape")document.getElementById("ar").style.display="none";});
init();
</script>
</body>
</html>
