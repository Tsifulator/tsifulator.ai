<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 40px; }
    .card { background: white; border-radius: 12px; padding: 40px; margin: 20px 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h2 { color: #1E293B; margin-bottom: 20px; font-size: 14px; }
    .icon-preview { width: 120px; height: 120px; margin: 0 auto; }
    .wordmark-preview { width: 300px; height: auto; margin: 0 auto; }
    .dark { background: #1E293B; }
  </style>
</head>
<body>
  <h1 style="color:#0D5EAF;">tsifl Logo Preview</h1>

  <div class="card">
    <h2>Wreath Icon (512x512)</h2>
    <img class="icon-preview" src="tsifl-wreath-icon.svg" />
  </div>

  <div class="card">
    <h2>Wreath Wordmark</h2>
    <img class="wordmark-preview" src="tsifl-wreath-wordmark.svg" />
  </div>

  <div class="card dark">
    <h2 style="color:white;">On Dark Background</h2>
    <img class="icon-preview" src="tsifl-wreath-icon.svg" style="filter: brightness(1.3);" />
  </div>
</body>
</html>
