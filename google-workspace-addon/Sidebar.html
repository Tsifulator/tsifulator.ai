<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root {
      --blue: #0D5EAF;
      --blue-hover: #0A4896;
      --blue-light: #EBF3FB;
      --bg: #FFFFFF;
      --surface: #F8FAFC;
      --border: #E2E8F0;
      --text: #1E293B;
      --text-muted: #64748B;
      --text-dim: #94A3B8;
      --green: #16A34A;
      --red: #DC2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; background: var(--bg); color: var(--text); height: 100vh; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* Login */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 30px 20px; gap: 10px; }
    #login-screen h2 { color: var(--blue); font-size: 18px; margin-bottom: 4px; }
    #login-tagline { font-size: 11px; color: var(--text-muted); margin-bottom: 28px; text-align: center; }
    #login-form { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    #login-form input { width: 100%; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 13px; outline: none; }
    #login-form input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(13,94,175,0.1); }
    #login-btn { background: var(--blue); color: white; border: none; border-radius: 6px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    #login-btn:hover { background: var(--blue-hover); }
    #signup-btn { background: transparent; color: var(--blue); border: 1px solid var(--border); border-radius: 6px; padding: 9px; font-size: 13px; cursor: pointer; }
    #auth-error { font-size: 11px; color: var(--red); text-align: center; min-height: 16px; }

    /* Chat */
    #chat-screen { display: none; flex-direction: column; height: 100vh; }
    #user-bar { font-size: 10px; color: var(--text-dim); padding: 3px 14px; background: var(--surface); border-bottom: 1px solid var(--border); }
    #chat-history { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background: var(--surface); }
    #chat-history::-webkit-scrollbar { width: 4px; }
    #chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message { padding: 9px 12px; border-radius: 6px; line-height: 1.5; word-wrap: break-word; font-size: 13px; white-space: pre-wrap; }
    .message.user { background: var(--blue-light); border-left: 2px solid var(--blue); }
    .message.assistant { background: var(--bg); border-left: 2px solid #86EFAC; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    .message.action { background: rgba(22,163,74,0.08); border-left: 2px solid var(--green); font-size: 11px; color: var(--green); font-family: monospace; padding: 6px 12px; }

    #input-area { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
    #image-preview-bar { display: none; gap: 6px; flex-wrap: wrap; }
    .img-item { position: relative; display: inline-block; }
    .img-item img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
    .img-remove { position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; background: var(--red); color: white; border: none; border-radius: 50%; font-size: 10px; line-height: 16px; text-align: center; cursor: pointer; }

    #user-input { width: 100%; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; resize: none; outline: none; line-height: 1.4; }
    #user-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(13,94,175,0.08); background: var(--bg); }
    #input-actions { display: flex; gap: 6px; }
    #attach-btn { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 15px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
    #attach-btn:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
    #submit-btn { background: var(--blue); color: white; border: none; border-radius: 6px; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; flex: 1; }
    #submit-btn:hover { background: var(--blue-hover); }
    #submit-btn:disabled { background: var(--surface); color: var(--text-dim); cursor: not-allowed; }
    #status-bar { padding: 4px 12px; font-size: 10px; color: var(--text-dim); background: var(--surface); border-top: 1px solid var(--border); }
    .image-badge { display: inline-block; background: rgba(13,94,175,0.09); color: var(--blue); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="login-screen">
      <h2>tsifl</h2>
      <div id="login-tagline">Agentic Sandbox for Financial Analysts</div>
      <div id="login-form">
        <input type="email" id="auth-email" placeholder="Email"/>
        <input type="password" id="auth-password" placeholder="Password"/>
        <button id="login-btn">Sign In</button>
        <button id="signup-btn">Create Account</button>
        <div id="auth-error"></div>
      </div>
    </div>

    <div id="chat-screen">
      <div id="user-bar"></div>
      <div id="chat-history"></div>
      <div id="input-area">
        <div id="image-preview-bar"></div>
        <textarea id="user-input" placeholder="Ask tsifl anything about your document..." rows="3"></textarea>
        <div id="input-actions">
          <input type="file" id="image-input" accept="image/*" multiple style="display:none;"/>
          <button id="attach-btn" title="Attach image">+</button>
          <button id="submit-btn">Send</button>
        </div>
      </div>
      <div id="status-bar">Ready</div>
    </div>
  </div>

  <script>
    var currentUser = null;
    var pendingImages = [];
    var appType = "sheets"; // default; will be detected

    // Detect app type from URL
    try {
      var url = window.parent.location.href || "";
      if (url.indexOf("spreadsheets") !== -1) appType = "sheets";
      else if (url.indexOf("document") !== -1) appType = "docs";
      else if (url.indexOf("presentation") !== -1) appType = "slides";
    } catch (e) {
      // Cross-origin — try from parent title
      try {
        var title = window.parent.document.title || "";
        if (title.indexOf("Sheets") !== -1) appType = "sheets";
        else if (title.indexOf("Docs") !== -1) appType = "docs";
        else if (title.indexOf("Slides") !== -1) appType = "slides";
      } catch (e2) {}
    }

    // Check stored session
    var stored = localStorage.getItem("tsifl_gws_session");
    if (stored) {
      try {
        var session = JSON.parse(stored);
        google.script.run.withSuccessHandler(function(result) {
          if (result.access_token) {
            localStorage.setItem("tsifl_gws_session", JSON.stringify(result));
            showChat({ id: result.user.id, email: result.user.email });
          } else { showLogin(); }
        }).withFailureHandler(function() { showLogin(); })
          .refreshToken(session.refresh_token);
      } catch (e) { showLogin(); }
    } else { showLogin(); }

    // Auth
    document.getElementById("login-btn").onclick = function() {
      var email = document.getElementById("auth-email").value.trim();
      var password = document.getElementById("auth-password").value;
      var errEl = document.getElementById("auth-error");
      errEl.textContent = "";
      if (!email || !password) { errEl.textContent = "Enter email and password."; return; }

      google.script.run.withSuccessHandler(function(result) {
        if (result.error || result.error_description) {
          errEl.textContent = result.error_description || result.msg || "Sign in failed";
          return;
        }
        localStorage.setItem("tsifl_gws_session", JSON.stringify(result));
        showChat({ id: result.user.id, email: result.user.email });
      }).withFailureHandler(function(e) {
        errEl.textContent = "Sign in failed: " + e.message;
      }).signIn(email, password);
    };

    document.getElementById("signup-btn").onclick = function() {
      var email = document.getElementById("auth-email").value.trim();
      var password = document.getElementById("auth-password").value;
      var errEl = document.getElementById("auth-error");
      errEl.textContent = "";
      if (!email || !password) { errEl.textContent = "Enter email and password."; return; }
      if (password.length < 6) { errEl.textContent = "Password must be 6+ characters."; return; }

      google.script.run.withSuccessHandler(function(result) {
        if (result.error) { errEl.textContent = result.error_description || "Sign up failed"; return; }
        errEl.style.color = "#16A34A";
        errEl.textContent = "Check email to confirm, then sign in.";
      }).withFailureHandler(function(e) {
        errEl.textContent = "Sign up failed: " + e.message;
      }).signUp(email, password);
    };

    function showLogin() {
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("chat-screen").style.display = "none";
    }

    function showChat(user) {
      currentUser = user;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";
      var appLabel = { sheets: "Sheets", docs: "Docs", slides: "Slides" }[appType] || "Google";
      document.getElementById("user-bar").textContent = user.email + " · " + appLabel;
    }

    // Image handling
    document.getElementById("attach-btn").onclick = function() { document.getElementById("image-input").click(); };
    document.getElementById("image-input").onchange = function(e) {
      for (var i = 0; i < e.target.files.length; i++) {
        addImage(e.target.files[i]);
      }
      e.target.value = "";
    };

    document.getElementById("user-input").addEventListener("paste", function(e) {
      var items = (e.clipboardData || {}).items || [];
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image/") === 0) addImage(items[i].getAsFile());
      }
    });

    function addImage(file) {
      var reader = new FileReader();
      reader.onload = function() {
        pendingImages.push({ media_type: file.type || "image/png", data: reader.result.split(",")[1], preview: reader.result });
        updatePreview();
      };
      reader.readAsDataURL(file);
    }

    function updatePreview() {
      var bar = document.getElementById("image-preview-bar");
      if (pendingImages.length === 0) { bar.style.display = "none"; bar.innerHTML = ""; return; }
      bar.style.display = "flex";
      bar.innerHTML = pendingImages.map(function(img, i) {
        return '<div class="img-item"><img src="' + img.preview + '"/><button class="img-remove" data-i="' + i + '">x</button></div>';
      }).join("");
      bar.querySelectorAll(".img-remove").forEach(function(b) {
        b.onclick = function() { pendingImages.splice(+b.dataset.i, 1); updatePreview(); };
      });
    }

    // Submit
    document.getElementById("submit-btn").onclick = handleSubmit;
    document.getElementById("user-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
    });

    function handleSubmit() {
      var input = document.getElementById("user-input");
      var msg = input.value.trim();
      if (!msg && pendingImages.length === 0) return;
      input.value = "";
      document.getElementById("submit-btn").disabled = true;
      document.getElementById("status-bar").textContent = "Thinking...";

      var imgCount = pendingImages.length;
      appendMessage("user", msg, imgCount);

      var images = pendingImages.map(function(i) { return { media_type: i.media_type, data: i.data }; });
      pendingImages = [];
      updatePreview();

      google.script.run.withSuccessHandler(function(result) {
        appendMessage("assistant", result.reply);

        if (result.tasks_remaining >= 0) {
          var appLabel = { sheets: "Sheets", docs: "Docs", slides: "Slides" }[appType] || "";
          document.getElementById("user-bar").textContent = currentUser.email + " · " + appLabel + " · " + result.tasks_remaining + " tasks left";
        }

        var actionResults = result.action_results || [];
        if (actionResults.length > 0) {
          var succeeded = actionResults.filter(function(a) { return a.success; }).length;
          var failed = actionResults.length - succeeded;
          appendMessage("action", succeeded + " action(s) completed" + (failed > 0 ? ", " + failed + " failed" : ""));
        }

        document.getElementById("submit-btn").disabled = false;
        document.getElementById("status-bar").textContent = "Ready";
      }).withFailureHandler(function(e) {
        appendMessage("assistant", "Error: " + e.message);
        document.getElementById("submit-btn").disabled = false;
        document.getElementById("status-bar").textContent = "Error — try again";
      }).sendChat(currentUser.id, msg, appType, images.length > 0 ? images : null);
    }

    function appendMessage(role, text, imgCount) {
      var h = document.getElementById("chat-history");
      var d = document.createElement("div");
      d.className = "message " + role;
      d.textContent = text || "";
      if (imgCount > 0) {
        var b = document.createElement("div");
        b.className = "image-badge";
        b.textContent = imgCount + " image" + (imgCount > 1 ? "s" : "") + " attached";
        d.appendChild(b);
      }
      h.appendChild(d);
      h.scrollTop = h.scrollHeight;
    }
  </script>
</body>
</html>
