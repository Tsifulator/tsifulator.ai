<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tsifl</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <div id="app">

    <!-- ── LOGIN SCREEN ── -->
    <div id="login-screen">
      <img id="login-logo" src="/assets/tsifl-wordmark.png" alt="tsifl" />
      <div id="login-tagline">Agentic Sandbox for Financial Analysts</div>

      <div id="login-form">
        <input type="email"    id="auth-email"    placeholder="Email" autocomplete="email"/>
        <div id="password-wrap" style="position:relative;">
          <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password"/>
          <button type="button" id="toggle-pw-btn" title="Show password" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:#64748B;">&#128065;</button>
        </div>
        <button id="login-btn">Sign In</button>
        <button id="signup-btn" class="secondary">Create Account</button>
        <div id="auth-error"></div>
        <button id="forgot-pw-btn" style="background:none;border:none;color:#0D5EAF;font-size:11px;cursor:pointer;margin-top:4px;">Forgot password?</button>
      </div>
    </div>

    <!-- ── MAIN CHAT SCREEN (shown after login) ── -->
    <div id="chat-screen" style="display:none;">

      <!-- Session expiry warning banner (Improvement 7) -->
      <div id="session-warning" style="display:none;background:#FFFBEB;color:#D97706;padding:4px 10px;font-size:11px;text-align:center;border-bottom:1px solid #FDE68A;">
        Session expires soon <button id="refresh-session-btn" style="background:#D97706;color:white;border:none;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;margin-left:6px;">Refresh</button>
      </div>

      <!-- Backend unreachable banner — shown when health probe fails -->
      <div id="backend-banner" style="display:none;">
        <div id="backend-banner-inner">
          <span id="backend-banner-icon">⚠︎</span>
          <div id="backend-banner-body">
            <div id="backend-banner-title">Can't reach tsifl backend</div>
            <div id="backend-banner-detail"></div>
          </div>
          <button id="backend-banner-retry">Retry</button>
        </div>
      </div>

      <div id="header">
        <img id="logo-img" src="/assets/tsifl-wordmark.png" alt="tsifl" />
        <div id="header-right">
          <button id="undo-btn" class="header-btn" title="Undo last action" style="display:none;">Undo</button>
          <span id="tasks-remaining"></span>
          <button id="logout-btn" title="Sign out">&#8617;</button>
        </div>
      </div>

      <div id="user-bar"></div>

      <!-- Memory panel — shows what project_memory is tracking for this workbook -->
      <div id="memory-panel" style="display:none;">
        <div id="memory-header">
          <span id="memory-title">Memory</span>
          <span id="memory-count">0 cells</span>
          <button id="memory-toggle" title="Expand / collapse">&#9656;</button>
          <button id="memory-clear" title="Clear memory for this workbook" style="display:none;">Reset</button>
        </div>
        <div id="memory-list" style="display:none;"></div>
      </div>

      <!-- Progress bar (Improvement 13) -->
      <div id="progress-bar-wrap" style="display:none;padding:0 12px;">
        <div style="background:#E2E8F0;border-radius:2px;height:3px;width:100%;overflow:hidden;">
          <div id="progress-bar" style="background:#0D5EAF;height:100%;width:0%;transition:width 0.3s ease;"></div>
        </div>
        <div id="progress-text" style="font-size:10px;color:#64748B;text-align:center;margin-top:2px;"></div>
      </div>

      <div id="chat-history"></div>

      <!-- Action history panel (Improvement 12) -->
      <div id="history-panel" style="display:none;max-height:150px;overflow-y:auto;border-top:1px solid #E2E8F0;padding:6px 10px;font-size:11px;">
        <div style="font-weight:600;color:#64748B;margin-bottom:4px;cursor:pointer;" id="history-toggle">History &#9660;</div>
        <div id="history-list"></div>
      </div>

      <div id="input-area">
        <div id="image-preview-bar" style="display:none;"></div>
        <textarea
          id="user-input"
          placeholder="Ask tsifl about your spreadsheet..."
          rows="2"
        ></textarea>
        <div id="input-actions">
          <div id="attach-wrap" style="position:relative;flex-shrink:0;">
            <input type="file" id="image-input" accept="image/*,.pdf,.csv,.txt,.json,.xml,.r,.R,.py,.js,.ts,.sql,.md,.html,.yaml,.yml,.docx,.xlsx,.sas,.do,.log" multiple style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2;" />
            <button id="attach-btn" title="Attach file" style="pointer-events:none;">+</button>
          </div>
          <button id="submit-btn">Send</button>
        </div>
      </div>

      <div id="status-bar">Ready</div>

      <!-- Toast notifications (memory actions, etc) — floating, auto-dismiss -->
      <div id="toast-wrap"></div>

      <!-- Auth debug panel (Improvement 10) — triple-click logo to show -->
      <div id="debug-panel" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1E293B;color:#E2E8F0;padding:8px 10px;font-size:10px;font-family:monospace;z-index:200;">
        <div>Token expires: <span id="dbg-expiry">—</span></div>
        <div>Last sync: <span id="dbg-last-sync">—</span></div>
        <div>Session source: <span id="dbg-source">—</span></div>
      </div>
    </div>

  </div>
  <script src="taskpane.js"></script>
</body>
</html>
