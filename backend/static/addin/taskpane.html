<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>tsifl</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><script defer="defer" src="taskpane.js"></script></head><body><div id="app"><div id="login-screen"><img id="login-logo" src="/assets/tsifl-wordmark.png" alt="tsifl"/><div id="login-tagline">Agentic Sandbox for Financial Analysts</div><div id="login-form"><input type="email" id="auth-email" placeholder="Email" autocomplete="email"/> <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password"/> <label id="show-pw-label" for="show-pw-cb"><input type="checkbox" id="show-pw-cb"/> <span>Show password</span></label> <button id="login-btn" type="button">Sign in</button><div id="auth-error"></div><div class="login-links"><button id="signup-btn" type="button" class="login-link">Create account</button> <span class="login-link-sep">·</span> <button id="forgot-pw-btn" type="button" class="login-link">Forgot password</button></div></div></div><div id="chat-screen" style="display:none;"><div id="session-warning" style="display:none;background:#FFFBEB;color:#D97706;padding:4px 10px;font-size:11px;text-align:center;border-bottom:1px solid #FDE68A;">Session expires soon <button id="refresh-session-btn" style="background:#D97706;color:white;border:none;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;margin-left:6px;">Refresh</button></div><div id="backend-banner" style="display:none;"><div id="backend-banner-inner"><span id="backend-banner-icon">⚠︎</span><div id="backend-banner-body"><div id="backend-banner-title">Can't reach tsifl backend</div><div id="backend-banner-detail"></div></div><button id="backend-banner-retry">Retry</button></div></div><div id="header"><img id="logo-img" src="/assets/tsifl-wordmark.png" alt="tsifl"/><div id="header-right"><button id="undo-btn" class="header-btn" title="Undo last
